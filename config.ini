[MovieID]
# Ignore these strings when guessing movie title from filename (semicolon-separated)
ignore_words = 144P;240P;360P;480P;720P;1080P;2K;4K;BluRay;BDRip;HDRip;WEB-DL;WEBRip;HDTV;x264;x265;HEVC;AAC;DTS;REMUX

[File]
# Directory to scan (leave empty to prompt at runtime)
scan_dir =
# Video file extensions
media_ext = avi;flv;m2ts;m4v;mkv;mov;mp4;mpeg;ts;vob;webm;wmv;mpg
# Folders to ignore during scan
ignore_folder = #organized;.recycle;@eaDir
# Ignore video files smaller than this size (MiB, 0 to disable)
ignore_file_less_than = 100
# Move files to new folder after organizing
enable_file_move = yes

[Network]
use_proxy = no
proxy = http://127.0.0.1:1080
retry = 3
timeout = 10

[CrawlerSelect]
# Crawler priority order (data is merged from left to right)
crawlers = tmdb,douban

[Crawler]
# Required fields for a successful scrape
required_keys = cover,title
# TMDb API key (get yours free at https://www.themoviedb.org/settings/api)
tmdb_api_key =
# Preferred language for TMDb results
tmdb_language = zh-CN
# Wait time between scrapes (seconds, 0 to disable)
sleep_after_scraping = 1

[NamingRule]
# Media server type (universal/jellyfin/emby/plex)
media_server = universal
# Output folder for organized files
output_folder = #organized
# Folder structure for organized files
save_dir = $title ($year)
# Filename pattern
filename = $title ($year)
# Maximum file path length
max_path_len = 250
# NFO title pattern
nfo_title = $title ($year)
# Fallback values
null_for_title = Unknown Title
null_for_director = Unknown Director
null_for_genre = Unknown

[Picture]
# Download high-resolution covers
use_high_res_cover = yes
# Download additional backdrop images
download_backdrop = no

[Translate]
# Translation engine: google, bing, or empty to disable
engine =
# Translate title to Chinese
translate_title = no
